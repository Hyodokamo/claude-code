name: ai-risk-classify

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  classify:
    name: classify changed files
    runs-on: ubuntu-latest

    steps:
      - name: Get changed files and classify risk
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Repository: ${REPOSITORY}"
          echo "Pull request: #${PR_NUMBER}"

          gh api --paginate \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/files" \
            --jq '.[].filename' > changed_files.txt

          echo "Changed files:"
          cat changed_files.txt

          HIGH_RISK=0
          MEDIUM_RISK=0

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            case "$file" in
              .github/workflows/*)
                echo "HIGH: $file changes GitHub Actions workflows"
                HIGH_RISK=1
                ;;
              .github/CODEOWNERS)
                echo "HIGH: $file changes CODEOWNERS"
                HIGH_RISK=1
                ;;
              src/security/*)
                echo "HIGH: $file changes security-related code"
                HIGH_RISK=1
                ;;
              package.json|package-lock.json|pnpm-lock.yaml|yarn.lock)
                echo "MEDIUM: $file changes dependencies or lock files"
                MEDIUM_RISK=1
                ;;
              *)
                echo "LOW: $file"
                ;;
            esac
          done < changed_files.txt

          echo ""
          echo "Risk summary:"
          echo "HIGH_RISK=${HIGH_RISK}"
          echo "MEDIUM_RISK=${MEDIUM_RISK}"

          if [ "$HIGH_RISK" -eq 1 ]; then
            echo "This PR contains high-risk changes. Manual review is required."
            exit 1
          fi

          echo "No high-risk changes detected."
